{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1"/>
    <title>Create Account | ANYRECO</title>

    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap" />
    <link rel="stylesheet" href="{% static 'dashboard/plugins/fontawesome-free/css/all.min.css' %}">
    
    <style>
        /* --- Modern CSS Reset & Variables --- */
        :root {
            --primary-color: #007bff;
            --primary-hover: #0056b3;
            --secondary-color: #6c757d;
            --success-color: #28a745;
            --warning-color: #ffc107;
            --danger-color: #dc3545;
            --info-color: #17a2b8;
            --orange-color: #fd7e14;
            --light-gray: #f8f9fa;
            --border-color: #dee2e6;
            --text-dark: #212529;
            --text-light: #495057;
            --border-radius: 8px;
            --shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
        }

        *, *::before, *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        /* --- Main Body & Background --- */
        body {
            font-family: 'Poppins', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
            padding: 20px;
        }

        /* --- Sign-up Card Container --- */
        .signup-container {
            width: 100%;
            max-width: 450px;
            padding: 40px;
            background: rgba(255, 255, 255, 0.85);
            backdrop-filter: blur(10px);
            border-radius: var(--border-radius);
            box-shadow: var(--shadow);
            border: 1px solid rgba(255, 255, 255, 0.2);
            text-align: center;
        }

        /* --- Header & Logo --- */
        .signup-header .signup-logo {
            width: 160px;
            margin-bottom: 20px;
        }
        .signup-header h1 {
            color: var(--text-dark);
            font-weight: 600;
            font-size: 24px;
            margin-bottom: 5px;
        }
        .signup-header p {
            color: var(--text-light);
            font-size: 15px;
            margin-bottom: 30px;
        }

        /* --- Form Elements & Input Groups --- */
        .form-group {
            margin-bottom: 1.25rem;
            text-align: left;
            position: relative;
        }
        .form-group .input-icon {
            position: absolute;
            top: 50%;
            left: 15px;
            transform: translateY(-50%);
            color: #adb5bd;
            z-index: 2;
        }
        .form-input {
            width: 100%;
            padding: 12px 15px 12px 45px; /* Add padding for icon */
            border: 1px solid var(--border-color);
            border-radius: var(--border-radius);
            font-size: 15px;
            font-family: 'Poppins', sans-serif;
            outline: none;
            transition: border-color 0.2s ease, box-shadow 0.2s ease;
        }
        .form-input:focus {
            border-color: var(--primary-color);
            box-shadow: 0 0 0 3px rgba(0,123,255,0.2);
        }
        .password-wrapper { 
            position: relative;
        }
        .password-wrapper .toggle-password {
            position: absolute;
            top: 50%;
            right: 15px;
            transform: translateY(-50%);
            cursor: pointer;
            color: #888;
            z-index: 2;
        }

        /* --- Buttons --- */
        .btn-primary {
            width: 100%;
            padding: 14px;
            background-image: linear-gradient(to right, var(--success-color), #208938);
            border: none;
            color: white;
            font-size: 16px;
            font-weight: 500;
            border-radius: var(--border-radius);
            cursor: pointer;
            margin-top: 10px;
            transition: transform 0.2s ease, box-shadow 0.2s ease;
        }
        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 15px rgba(40, 167, 69, 0.3);
        }

        /* --- Footer Link --- */
        .form-footer {
            margin-top: 30px;
            padding-top: 25px;
            border-top: 1px solid var(--border-color);
            color: var(--text-light);
        }
        .form-footer a {
            color: var(--primary-color);
            text-decoration: none;
            font-weight: 500;
        }
        .form-footer a:hover { text-decoration: underline; }

        /* --- Error Messages & Alerts --- */
        .error-message {
            color: var(--danger-color);
            font-size: 13px;
            margin-top: 8px;
            text-align: left;
        }
        .alert {
            padding: 12px 15px;
            margin-bottom: 20px;
            border: 1px solid transparent;
            border-radius: var(--border-radius);
            text-align: left;
            font-size: 14px;
        }
        .alert-danger {
            color: #721c24;
            background-color: #f8d7da;
            border-color: #f5c6cb;
        }
        .alert-success {
            color: #155724;
            background-color: #d4edda;
            border-color: #c3e6cb;
        }

        /* --- Password Strength Indicator --- */
        .password-strength-indicator {
            display: none;
            margin-top: 10px;
            height: 10px;
            background: #e9ecef;
            border-radius: 5px;
            overflow: hidden;
            position: relative;
        }
        .strength-bar {
            height: 100%;
            width: 0;
            transition: width 0.3s, background-color 0.3s;
            border-radius: 5px;
        }
        .strength-text {
            position: absolute;
            left: 10px;
            top: 50%;
            transform: translateY(-50%);
            font-size: 12px;
            font-weight: 500;
            color: var(--text-light);
        }
    </style>
</head>
<body>

    <div class="signup-container">
        <div class="signup-header">
            <img src="{% static 'projectimage/foresightdigital.png' %}" alt="Foresight Digital Logo" class="signup-logo">
            <h1>Create Your Account</h1>
            <p>Join us to manage your documents seamlessly.</p>
        </div>

        {% if messages %}
            {% for message in messages %}
                <div class="alert alert-{{ message.tags }}">
                    {{ message }}
                </div>
            {% endfor %}
        {% endif %}

        <form id="signupForm" method="post" action="{% url 'signup' %}">
            {% csrf_token %}
            
            {% if error %}
                <div class="alert alert-danger">{{ error }}</div>
            {% endif %}

            <div style="display: flex; gap: 1rem;">
                <div class="form-group" style="flex: 1;">
                    <i class="fas fa-user input-icon"></i>
                    <input type="text" id="first_name" name="first_name" class="form-input" placeholder="First Name" required />
                </div>
                <div class="form-group" style="flex: 1;">
                    <i class="fas fa-user input-icon"></i>
                    <input type="text" id="last_name" name="last_name" class="form-input" placeholder="Last Name" required />
                </div>
            </div>
            
            <div class="form-group">
                <i class="fas fa-building input-icon"></i>
                <input type="text" id="group_name" name="group_name" class="form-input" placeholder="Company / Group Name" required />
            </div>

            <div class="form-group">
                <i class="fas fa-envelope input-icon"></i>
                <input type="email" id="email" name="email" class="form-input" placeholder="Enter your email" required />
            </div>

            <div class="form-group">
                <div class="password-wrapper">
                    <i class="fas fa-lock input-icon"></i>
                    <input type="password" id="password" name="password" class="form-input" placeholder="Create a strong password" required />
                    <i class="fas fa-eye toggle-password" onclick="togglePasswordVisibility('password')"></i>
                </div>
                <div id="password-strength" class="password-strength-indicator">
                    <div class="strength-bar"></div>
                    <span class="strength-text"></span>
                </div>
            </div>

            <div class="form-group">
                <div class="password-wrapper">
                    <i class="fas fa-check-circle input-icon"></i>
                    <input type="password" id="password2" name="password2" class="form-input" placeholder="Confirm your password" required />
                    <i class="fas fa-eye toggle-password" onclick="togglePasswordVisibility('password2')"></i>
                </div>
                <div class="error-message" id="password-match-error"></div>
            </div>

            <button type="submit" class="btn-primary">Create Account</button>
        </form>

        <div class="form-footer">
            <p>Already have an account? <a href="{% url 'login' %}">Log In</a></p>
        </div>
    </div>

    <script>
        function togglePasswordVisibility(fieldId) {
            const input = document.getElementById(fieldId);
            const icon = input.parentElement.querySelector('.toggle-password');
            const isPassword = input.type === "password";
            input.type = isPassword ? "text" : "password";
            icon.classList.toggle("fa-eye");
            icon.classList.toggle("fa-eye-slash");
        }

        document.addEventListener('DOMContentLoaded', function() {
            const form = document.getElementById('signupForm');
            const password = document.getElementById('password');
            const password2 = document.getElementById('password2');
            const matchError = document.getElementById('password-match-error');
            const strengthIndicator = document.getElementById('password-strength');
            const strengthBar = strengthIndicator.querySelector('.strength-bar');
            const strengthText = strengthIndicator.querySelector('.strength-text');

            form.addEventListener('submit', function(event) {
                if (password.value !== password2.value) {
                    event.preventDefault(); 
                    matchError.textContent = 'Passwords do not match.';
                    document.getElementById('password2').style.borderColor = 'var(--danger-color)';
                } else {
                    matchError.textContent = '';
                    document.getElementById('password2').style.borderColor = 'var(--border-color)';
                }
            });

            password.addEventListener('input', function() {
                const val = password.value;
                let score = 0;
                if (!val) {
                    strengthIndicator.style.display = 'none';
                    return;
                }
                strengthIndicator.style.display = 'block';

                if (val.length >= 8) score++;
                if (/[a-z]/.test(val)) score++;
                if (/[A-Z]/.test(val)) score++;
                if (/\d/.test(val)) score++;
                if (/[^A-Za-z0-9]/.test(val)) score++;

                const levels = ['Very Weak', 'Weak', 'Fair', 'Good', 'Strong'];
                const colors = ['var(--danger-color)', 'var(--orange-color)', 'var(--warning-color)', 'var(--info-color)', 'var(--success-color)'];
                const widths = ['20%', '40%', '60%', '80%', '100%'];
                
                const levelIndex = Math.max(0, score - 1);
                strengthText.textContent = `Strength: ${levels[levelIndex]}`;
                strengthBar.style.width = widths[levelIndex];
                strengthBar.style.backgroundColor = colors[levelIndex];
            });
        });
    </script>
</body>
</html>

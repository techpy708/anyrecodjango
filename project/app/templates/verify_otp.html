{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <title>Verify OTP</title>
  <link rel="stylesheet" href="{% static 'dashboard/plugins/google/fonts.css' %}"/>
  <link rel="stylesheet" href="{% static 'dashboard/plugins/fontawesome-free/css/all.min.css' %}">
  <link rel="stylesheet" href="{% static 'projectcss/login.css' %}"/>
</head>
<body>
  <div class="login-container">
    <div class="login-header">
      <h1>Verify OTP</h1>
      <p>Check your email for the OTP code</p>
    </div>
    <form method="post" action="{% url 'verify_otp' %}">
      {% csrf_token %}
      <label for="otp">OTP Code</label>
      <input type="text" id="otp" name="otp" placeholder="Enter OTP" required maxlength="6"/>
      {% if error %}
        <div class="error-message">{{ error }}</div>
      {% endif %}
      <button type="submit" class="btn-primary">Verify & Sign In</button>
    </form>
  </div>
</body>
</html>
